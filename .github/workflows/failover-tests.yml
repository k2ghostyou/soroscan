name: Failover Tests

on:
  push:
    branches: [main]
    paths:
      - "failover-tests/**"
      - "django-backend/soroscan/ingest/tests/test_failover.py"
      - "django-backend/soroscan/health.py"
      - ".github/workflows/failover-tests.yml"
  pull_request:
    branches: [main]
    paths:
      - "failover-tests/**"
      - "django-backend/soroscan/ingest/tests/test_failover.py"
      - "django-backend/soroscan/health.py"
      - ".github/workflows/failover-tests.yml"

jobs:
  validate-scenarios:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: failover-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install pytest PyYAML

      - name: Validate failover scenarios
        run: python -m pytest -q

  django-failover:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_soroscan
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run failover simulations
        working-directory: django-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_soroscan
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
          DJANGO_SETTINGS_MODULE: soroscan.settings_test
          CELERY_TASK_ALWAYS_EAGER: "True"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pytest soroscan/ingest/tests/test_failover.py -v

  live-recovery-probes:
    runs-on: ubuntu-latest
    needs: [validate-scenarios, django-failover]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_soroscan
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start API server
        working-directory: django-backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_soroscan
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: "False"
          DJANGO_SETTINGS_MODULE: soroscan.settings_test
          CELERY_TASK_ALWAYS_EAGER: "True"
          SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
          STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
          SOROSCAN_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          INDEXER_SECRET_KEY: ""
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py runserver 0.0.0.0:8000 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health/ > /dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - name: Install failover harness dependencies
        working-directory: failover-tests
        run: python -m pip install pytest PyYAML

      - name: Run live recovery probes
        env:
          BASE_URL: http://127.0.0.1:8000
          SOROSCAN_FAILOVER_RUN: "1"
          FAILOVER_REPORT_PATH: failover-tests/results/ci-failover-summary.json
        run: |
          mkdir -p failover-tests/results
          python failover-tests/run_failover.py \
            --execute \
            --exclude-scenario multiple_worker_failures \
            --report-path failover-tests/results/ci-failover-summary.json

      - name: Upload failover probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failover-probe-report
          path: failover-tests/results/ci-failover-summary.json
